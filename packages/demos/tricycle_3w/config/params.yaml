teleop:
  ros__parameters:
    wheelbase: 0.35
    max_linear: 1.0
    max_steering: 0.75
    command_timeout: 6.0
    manual_override_timeout: 3.0
    lidar_rays: 180
    lidar_range: 8.0
    laser_offset: 0.26
    auto_speed: 0.34
    world_map: warehouse
    initial_x: 0.0
    initial_y: 0.0
    initial_yaw: 0.0

slam_toolbox:
  ros__parameters:
    use_sim_time: false
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping
    resolution: 0.05
    min_laser_range: 0.11
    max_laser_range: 8.0
    minimum_time_interval: 0.1
    transform_publish_period: 0.05
    map_update_interval: 1.0
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    throttle_scans: 1
    enable_interactive_mode: false

lappa_slam_bridge:
  ros__parameters:
    snapshot_path: /ws/src/tricycle_3w/.lappa_runtime/slam_snapshot.json
    write_interval: 0.25
