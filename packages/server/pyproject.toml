[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lappa"
version = "0.4.61"
description = "Lappa - ROS2 package IDE: open/edit package code, native sim, Docker ros2 launch bridge, 3D mesh fit"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "MergeOS / ThanhTrucSolutions" }]
dependencies = [
  "typer>=0.12",
  "rich>=13.7",
  "pydantic>=2.6",
  "watchdog>=4.0",
  "fastapi>=0.110",
  "uvicorn>=0.27",
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4", "httpx>=0.27"]
api = ["fastapi>=0.110", "uvicorn>=0.27", "httpx>=0.27"]
gui = ["PySide6>=6.6"]
release = ["pyinstaller>=6.0", "PySide6>=6.6"]

[project.scripts]
lappa = "lappa.cli:app"
lappa-desktop = "lappa.desktop:main"
lappa-gui = "lappa.gui.app:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
lappa = ["assets/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
