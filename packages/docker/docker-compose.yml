services:
  lappa-ros2:
    build: .
    image: lappa-ros2:humble
    container_name: lappa-ros2
    volumes:
      - ../demos:/ws/src:rw
    environment:
      - ROS_DOMAIN_ID=42
    stdin_open: true
    tty: true
    # GUI show (optional): enable with VcXsrv / WSLg on Windows
    # environment:
    #   - DISPLAY=host.docker.internal:0.0
