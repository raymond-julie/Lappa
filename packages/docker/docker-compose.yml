# Image tag follows selected ROS2 distro (Dockerfile rewritten by Lappa).
# Default: humble. Switch via IDE title bar or `lappa ros2 set jazzy`.
#
# Bridge: packages/demos is bind-mounted at /ws/src so the Lappa Qt IDE
# can open/edit package sources and Docker
# `ros2 launch` sees the same files without rebuild.
services:
  lappa-ros2:
    build: .
    image: ${LAPPA_ROS2_IMAGE:-lappa-ros2:humble}
    container_name: lappa-ros2
    init: true
    volumes:
      - ../demos:/ws/src:rw
      - ./ros2_distro.txt:/ws/ros2_distro.txt:ro
    environment:
      - ROS_DOMAIN_ID=42
      - ROS_DISTRO=${LAPPA_ROS_DISTRO:-humble}
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", ". /opt/ros/$${ROS_DISTRO}/setup.sh && command -v ros2 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    # Keep container up for docker exec launch sessions from IDE/CLI
    command: ["bash", "-lc", "sleep infinity"]
    # GUI show (optional): enable with VcXsrv / WSLg on Windows
    # environment:
    #   - DISPLAY=host.docker.internal:0.0
